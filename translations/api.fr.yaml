http:
    '400': Requête incorrecte
    '401': Non autorisé
    '403': Interdit
    '404': Non trouvé
    '409': Conflit
    '413': Charge utile trop volumineuse
    '422': Contenu non traitable
    '500': Erreur interne du serveur

